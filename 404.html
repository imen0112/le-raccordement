<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0E2A47" />
<title>Page not found · Le Raccordement</title>
<meta name="robots" content="noindex, follow" />
<link rel="icon" type="image/png" href="/assets/img/logo/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/main.css?v=20260520d" />
<style>
  .err-wrap {
    min-height: 70vh;
    display: grid;
    place-items: center;
    padding: var(--s-12) var(--s-6);
  }
  .err {
    max-width: 600px;
    text-align: center;
  }
  .err-code {
    font-family: var(--ff-display);
    font-weight: 700;
    font-size: clamp(6rem, 18vw, 12rem);
    letter-spacing: -0.05em;
    line-height: 0.9;
    background: linear-gradient(180deg, var(--c-navy-800), var(--c-navy-500));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .err h1 {
    font-size: clamp(1.5rem, 3vw, 2rem);
    margin-top: var(--s-6);
  }
  .err p {
    color: var(--c-muted);
    margin-top: var(--s-3);
    font-size: var(--fs-16);
  }
  .err-actions {
    margin-top: var(--s-8);
    display: flex;
    flex-wrap: wrap;
    gap: var(--s-3);
    justify-content: center;
  }
  .err-cats {
    margin-top: var(--s-12);
    text-align: left;
    border-top: 1px solid var(--c-line);
    padding-top: var(--s-8);
  }
  .err-cats h3 {
    font-family: var(--ff-display);
    font-size: var(--fs-13);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--c-muted);
    margin-bottom: var(--s-4);
    text-align: center;
  }
  .err-cats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--s-3);
  }
  @media (min-width: 720px) { .err-cats-grid { grid-template-columns: repeat(4, 1fr); } }
  .err-cat-link {
    padding: var(--s-3);
    border: 1px solid var(--c-line);
    border-radius: 10px;
    font-family: var(--ff-display);
    font-weight: 600;
    color: var(--c-ink);
    text-align: center;
    transition: background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
  }
  .err-cat-link:hover { background: var(--c-bg-soft); border-color: var(--c-line-strong); }
</style>
</head>
<body>

<header class="site-header">
  <div class="container-wide header-inner">
    <a href="/" class="brand" aria-label="Le Raccordement — home">
      <img src="/assets/img/logo/logo.png" alt="Le Raccordement" />
    </a>
  </div>
</header>

<main>
  <div class="err-wrap">
    <div class="err">
      <div class="err-code">404</div>
      <h1>This page doesn't exist.</h1>
      <p>It might have been moved, renamed, or never existed. Pick one of the routes below or head back to the homepage.</p>

      <div class="err-actions">
        <a href="/" class="btn btn-primary btn-lg">Back to home <span class="arrow">→</span></a>
        <a href="/products/" class="btn btn-ghost btn-lg">Browse catalog</a>
      </div>

      <div class="err-cats">
        <h3>Or jump to a category</h3>
        <div class="err-cats-grid">
          <a href="/products/elbows.html" class="err-cat-link">Elbows</a>
          <a href="/products/tees.html" class="err-cat-link">Tees</a>
          <a href="/products/reducers.html" class="err-cat-link">Reducers</a>
          <a href="/products/caps.html" class="err-cat-link">Caps</a>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer" style="padding-block:var(--s-12) var(--s-6);">
  <div class="container-wide">
    <div class="footer-bottom" style="margin-top:0; padding-top:0; border-top:0;">
      <span>© <span data-year>2026</span> Le Raccordement. Made in Sfax, Tunisia.</span>
      <a href="/contact.html" style="color:rgba(255,255,255,0.7);">Contact us →</a>
    </div>
  </div>
</footer>

<script src="/js/main.js?v=20260520d"></script>
</body>
</html>
